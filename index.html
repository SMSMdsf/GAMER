<!DOCTYPE html>
<html>
<head>
    <title>The Skittlini Outbreakini | Tactical TD</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; user-select: none; overflow-x: hidden; }
        #main-container { display: none; justify-content: center; align-items: flex-start; margin: 20px auto; max-width: 1100px; }
        canvas { background: #111411; border: 4px solid #333; cursor: default; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        #sidebar { width: 260px; background: #151815; border: 4px solid #333; border-left: none; padding: 12px; text-align: left; box-sizing: border-box; height: 508px; overflow-y: auto; }
        .tower-btn { width: 100%; padding: 8px; margin: 5px 0; background: #222; color: #00ff00; border: 2px solid #00ff00; font-weight: bold; cursor: pointer; text-transform: uppercase; text-align: left; font-size: 11px; }
        .tower-btn:hover:not(:disabled) { background: #00ff00; color: #000; box-shadow: 0 0 10px #00ff00; }
        .tower-btn:disabled { border-color: #444; color: #555; cursor: not-allowed; }
        .action-btn { width: 100%; padding: 12px; margin: 5px 0; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; border-radius: 4px; box-shadow: 0 0 10px #00ff00; }
        .action-btn:disabled { background: #333; color: #555; box-shadow: none; cursor: not-allowed; }
        .stat-line { font-size: 15px; margin: 8px 0; font-weight: bold; color: #fff; }
        .screen { padding: 40px; max-width: 700px; margin: auto; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #story-text { font-size: 22px; line-height: 1.6; color: #ffffff; text-shadow: 0 0 8px #ff00ff; min-height: 150px; text-transform: uppercase; font-weight: bold; }
        .next-btn { background: #ff00ff; color: #fff; border: none; padding: 10px 25px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 0 10px #ff00ff; }
        .hp-bar-container { width: 120px; background: #330000; border: 2px solid #ff0000; height: 16px; border-radius: 4px; display: inline-block; vertical-align: middle; }
        #ui-hp-fill { width: 100%; background: #00ff00; height: 100%; transition: width 0.1s; }
    </style>
</head>
<body>

    <!-- INSTANT CAPTION SCREEN -->
    <div id="story-screen" class="screen">
        <h2 style="color: #ff00ff; font-size: 32px; letter-spacing: 2px;">🍬 THE SKITTLINI OUTBREAKINI 🍬</h2>
        <div id="story-text">Loading subtitles...</div>
        <button id="story-btn" class="next-btn" onclick="nextStoryLine()">NEXT CAPTION</button>
    </div>

    <!-- MAIN GAME LAYOUT -->
    <h1 id="game-title" style="display:none; margin: 10px 0 5px 0;">🪚 THE SKITTLINI OUTBREAKINI 🪚</h1>
    <div id="main-container">
        <canvas id="tdCanvas" width="800" height="550"></canvas>

        <div id="sidebar">
            <button id="play-btn" class="action-btn" onclick="startWaveCombat()">▶ PLAY WAVE</button>
            <div class="stat-line" style="color: #ff00ff;">Wave: <span id="ui-wave">1</span></div>
            <div class="stat-line" style="color: #ff3333;">Car Armor: <div class="hp-bar-container"><div id="ui-hp-fill"></div></div></div>
            <div class="stat-line" style="color: #00ffff;">Cash: $<span id="ui-cash">150</span></div>
            <hr style="border: 1px solid #333;">
            <div style="font-size: 11px; color: #aaa; margin-bottom: 3px;">DEPLOY BOYS:</div>
            
            <button id="btn-shuceeb" class="tower-btn" style="border-color: #ff00ff; color: #ff00ff;" onclick="selectTowerType('shuceeb', 50)">Shuceeb ($50)<br><span style="color:#fff; font-size:10px;">👑 Rainbow Skittle Gatling</span></button>
            <button id="btn-aadam" class="tower-btn" onclick="selectTowerType('aadam', 125)">Aadam ($125)<br><span style="color:#aaa; font-size:10px;">🤖 AI Robot Companion</span></button>
            <button id="btn-yakoub" class="tower-btn" onclick="selectTowerType('yakoub', 175)">Yakoub ($175)<br><span style="color:#aaa; font-size:10px;">🥛 Cream Laser (2s)</span></button>
            <button id="btn-daiyon" class="tower-btn" onclick="selectTowerType('daiyon', 150)">Daiyon ($150)<br><span style="color:#aaa; font-size:10px;">1.25x Dmg & Lvl 10 Gun</span></button>
            <button id="btn-arafat" class="tower-btn" onclick="selectTowerType('arafat', 200)">Arafat ($200)<br><span style="color:#aaa; font-size:10px;">🔥 Minigun (688 Frame Reload)</span></button>
            <button id="btn-naythan" class="tower-btn" onclick="selectTowerType('naythan', 250)">Naythan ($250)<br><span style="color:#aaa; font-size:10px;">⚔️ Katana Slice Strike</span></button>
            
            <div id="placement-mode" style="color: #ff00ff; font-size: 11px; margin-top: 10px; display: none; text-align: center; font-weight: bold; animation: flash 1s infinite;">[ CLICK MAP TO DEPLOY ]</div>
        </div>
    </div>

    <script>
        const storyLines = [
            "[SCENE 1: COAL CORNER SHOP]\n\nSHUCEEB LEAVES THE GAMING HOUSE TO BUY A MASSIVE STASH OF SKITTLES FOR ALL HIS FRIENDS...",
            "[SCENE 2: THE ENCOUNTER]\n\nAT THE CORNER, SHUCEEB SPOTS A WEIRD LOOKING GLOWING SPIDER CRAWRAMING ALONG THE CONCRETE WALL.",
            "[SCENE 3: THE INFECTION]\n\nTHE SPIDER SUDDENLY LEAPS ONTO A PASSING WOMAN! SHE INSTANTLY MUTATES INTO A HORRIFYING FLESH-EATING ALIEN!",
            "[SCENE 4: PEDAL TO THE METAL]\n\nSHUCEEB RUNS TO HIS SKITTLE CAR, SLAMS THE GAS, AND DRIFTS BACK TO THE HOUSE TO WARN THE CREW!",
            "[SCENE 5: FORTIFICATION]\n\nTHE BOYS AGREE TO FORTIFY THE BLOCK AND DROP DEFENSE TOWERS TO STOP THE SKITTLINI OUTBREAKINI!"
        ];
        
        let storyIdx = 0;
        function showCaption() {
            document.getElementById("story-text").innerText = storyLines[storyIdx];
            if (storyIdx === storyLines.length - 1) {
                document.getElementById("story-btn").innerText = "LAUNCH COMBAT GRID";
            } else {
                document.getElementById("story-btn").innerText = "NEXT CAPTION";
            }
        }

        function nextStoryLine() {
            storyIdx++;
            if (storyIdx < storyLines.length) {
                showCaption();
            } else {
                document.getElementById("story-screen").style.display = "none";
                document.getElementById("game-title").style.display = "block";
                document.getElementById("main-container").style.display = "flex";
                initGameEngine();
            }
        }

        window.onload = function() { showCaption(); };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAudioSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'laser') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'combo') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }
        }

        function startThemeMusic() {
            setInterval(() => {
                if (!waveInProgess) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                const notes = [130.81, 146.83, 164.81, 196.00];
                osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            }, 350);
        }

        const canvas = document.getElementById("tdCanvas");
        const ctx = canvas.getContext("2d");

        let cash = 150, baseHp = 20, maxBaseHp = 20, waveNum = 1;
        let selectedType = null, selectedCost = 0;
        let enemies = [], towers = [], projectiles = [], lasers = [], swordSlashes = [], drones = [], activeCombos = [];
        let enemiesSpawning = 0, waveInProgess = false;
        let currentMouseX = 0, currentMouseY = 0;

        const path = [
            {x: 0, y: 150}, {x: 250, y: 150}, {x: 250, y: 410}, 
            {x: 550, y: 410}, {x: 550, y: 250}, {x: 750, y: 250}
        ];

        function initGameEngine() {
            canvas.addEventListener("mousemove", (e) => {
                const rect = canvas.getBoundingClientRect();
                currentMouseX = e.clientX - rect.left;
                currentMouseY = e.clientY - rect.top;
            });
            canvas.addEventListener("mousedown", placeDefenderUnit);
            setInterval(gameTick, 1000 / 30);
            startThemeMusic();
            
            setInterval(() => {
                if (!waveInProgess) return;
                let arafatCount = towers.filter(t => t.type === 'arafat').length;
                if (arafatCount > 0 && baseHp < maxBaseHp) {
                    baseHp = Math.min(maxBaseHp, baseHp + (3 * arafatCount));
                    updateUI();
                }
            }, 5000);
        }

        function startWaveCombat() {
            if (waveInProgess) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            waveInProgess = true;
            enemiesSpawning = 6 + (waveNum * 4);
            document.getElementById("play-btn").disabled = true;
            spawnZombieWave();
        }

        function selectTowerType(type, cost) {
            if (cash >= cost) { selectedType = type; selectedCost = cost; document.getElementById("placement-mode").style.display = "block"; }
        }

        function placeDefenderUnit() {
            if (!selectedType || isOnRoad(currentMouseX, currentMouseY)) return;

            let range = 100, fireRate = 25, color = "#00ffff", size = 15; 
            if (selectedType === "shuceeb") { range = 150; fireRate = 4; color = "#ff00ff"; size = 16; } 
            if (selectedType === "aadam") { range = 130; fireRate = 30; color = "#ff0055"; size = 19; } 
            if (selectedType === "yakoub") { range = 240; fireRate = 60; color = "#ffffff"; size = 15; } 
            if (selectedType === "daiyon") { range = 150; fireRate = 10; color = "#9900ff"; size = 15; }
            if (selectedType === "arafat") { range = 140; fireRate = 15; color = "#00ff66"; size = 16; } 
            if (selectedType === "naythan") { range = 70; fireRate = 20; color = "#ff6600"; size = 17; } 

            let newTower = { x: currentMouseX, y: currentMouseY, type: selectedType, range: range, fireRate: fireRate, cd: 0, color: color, size: size, clip: 40, reloadTimer: 0 };
            towers.push(newTower);

            if (selectedType === "aadam") {
                drones.push({ x: currentMouseX - 20, y: currentMouseY - 20, angle: 0, parent: newTower });
            }

            cash -= selectedCost;
            selectedType = null;
            document.getElementById("placement-mode").style.display = "none";
            updateUI();
        }

        function isOnRoad(px, py) {
            if (py >= 115 && py <= 185 && px <= 285) return true;
            if (px >= 215 && px <= 285 && py >= 115 && py <= 445) return true;
            if (py >= 375 && py <= 445 && px >= 215 && px <= 585) return true;
            if (px >= 515 && px <= 585 && py >= 215 && py <= 445) return true;
            if (py >= 215 && py <= 285 && px >= 515) return true;
            return false;
        }

        function spawnZombieWave() {
            if (!waveInProgess) return;
            
            // Check for Milestone Boss waves
            if ((waveNum === 5 || waveNum === 10) && enemiesSpawning === (6 + (waveNum * 4))) {
                enemies.push({ 
                    x: path.x, y: path.y, pathIndex: 0, 
                    hp: 150 * (waveNum / 5), maxHp: 150 * (waveNum / 5), 
                    speed: 0.6, size: 28, color: "#9900ff", type: "boss" 
                });
                enemiesSpawning = 0; // Boss solos the wave
                return;
            }

            if (enemiesSpawning > 0) {
                let eHp = 2 + Math.floor(waveNum * 1.6);
                let speed = 1.2 + (waveNum * 0.04);
                let isSpiderAlien = Math.random() < 0.25;
                enemies.push({ 
                    x: path.x, y: path.y, pathIndex: 0, 
                    hp: isSpiderAlien ? eHp * 0.7 : eHp, maxHp: isSpiderAlien ? eHp * 0.7 : eHp, 
                    speed: isSpiderAlien ? speed * 1.6 : speed, size: isSpiderAlien ? 10 : 13,
                    color: isSpiderAlien ? "#ff00ff" : "#00ff00", type: isSpiderAlien ? "spider" : "normal"
                });
                enemiesSpawning--;
                setTimeout(spawnZombieWave, Math.max(400, 1500 - waveNum * 50));
            }
        }

        function gameTick() {
            if (waveInProgess) {
                enemies.forEach((e, idx) => {
                    let target = path[e.pathIndex + 1];
                    let dist = Math.hypot(target.x - e.x, target.y - e.y);
                    if (dist > e.speed) { e.x += ((target.x - e.x) / dist) * e.speed; e.y += ((target.y - e.y) / dist) * e.speed; } 
                    else {
                        e.pathIndex++;
                        if (e.pathIndex >= path.length - 1) {
                            baseHp--; enemies.splice(idx, 1); updateUI();
                            if (baseHp <= 0) { alert("THE OUTBREAKINI DESTROYED THE SKITTLE CAR! Game Over."); location.reload(); }
                        }
                    }
                });
            }

            lasers.forEach((l, idx) => { l.life--; if(l.life <= 0) lasers.splice(idx, 1); });
            swordSlashes.forEach((s, idx) => { s.life--; if(s.life <= 0) swordSlashes.splice(idx, 1); });
            activeCombos.forEach((c, idx) => { c.life--; if(c.life <= 0) activeCombos.splice(idx, 1); });

            drones.forEach(d => {
                d.angle += 0.08;
                d.x = d.parent.x + Math.cos(d.angle) * 25;
                d.y = d.parent.y + Math.sin(d.angle) * 25;
            });

            // PROCESS TEAM COMBO SYSTEM SQUAD SYNERGY LINKS
            let daiyons = towers.filter(t => t.type === "daiyon");
            let aadams = towers.filter(t => t.type === "aadam");
            daiyons.forEach(d => {
                aadams.forEach(a => {
                    if (Math.hypot(d.x - a.x, d.y - a.y) < 160 && Math.random() < 0.03 && enemies.length > 0) {
                        playAudioSound('combo');
                        activeCombos.push({ sx: d.x, sy: d.y, tx: a.x, ty: a.y, life: 8 });
                        enemies.forEach(e => {
                            // Hit enemies walking between the link points
                            let midX = (d.x + a.x) / 2;
                            let midY = (d.y + a.y) / 2;
                            if (Math.hypot(e.x - midX, e.y - midY) < 80) {
                                e.hp -= 3;
                            }
                        });
                    }
                });
            });

            towers.forEach(t => {
                if (t.type === "arafat" && t.reloadTimer > 0) { t.reloadTimer--; return; }
                if (t.cd > 0) t.cd--;
                
                if (t.cd === 0 && enemies.length > 0) {
                    let targetEnemy = null, closestDist = t.range;
                    enemies.forEach(e => {
                        let d = Math.hypot(e.x - t.x, e.y - t.y);
                        if (d < closestDist) { closestDist = d; targetEnemy = e; }
                    });
                    
                    if (targetEnemy) {
                        if (t.type === "yakoub") {
                            playAudioSound('laser');
                            lasers.push({ sx: t.x, sy: t.y, tx: targetEnemy.x, ty: targetEnemy.y, life: 10 });
                            targetEnemy.hp -= 8;
                            t.cd = t.fireRate;
                        } 
                        else if (t.type === "arafat") {
                            t.clip--; playAudioSound('shoot');
                            projectiles.push({ x: t.x, y: t.y, tx: targetEnemy.x, ty: targetEnemy.y, speed: 16, target: targetEnemy, dmg: 1.0, color: t.color, type: t.type });
                            if (t.clip <= 0) { t.reloadTimer = 688; t.clip = 40; } else { t.cd = t.fireRate; }
                        }
                        else if (t.type === "naythan") {
                            swordSlashes.push({ x: t.x, y: t.y, range: t.range, life: 6 });
                            enemies.forEach(e => { if (Math.hypot(e.x - t.x, e.y - t.y) < t.range + 10) e.hp -= 6.0; });
                            t.cd = t.fireRate;
                        }
                        else if (t.type === "aadam") {
                            playAudioSound('shoot');
                            let droneAnchor = drones.find(dr => dr.parent === t);
                            let sx = droneAnchor ? droneAnchor.x : t.x;
                            let sy = droneAnchor ? droneAnchor.y : t.y;
                            projectiles.push({ x: sx, y: sy, tx: targetEnemy.x, ty: targetEnemy.y, speed: 14, target: targetEnemy, dmg: 4.5, color: "#fff", type: t.type });
                            t.cd = t.fireRate;
                        }
                        else {
                            let dmg = t.type === "shuceeb" ? 8.0 : 4.25;
                            playAudioSound('shoot');
                            let bulletColors = ["#ff0000", "#ffcc00", "#00ff00", "#00ffff", "#ff00ff"];
                            let chosenColor = t.type === "shuceeb" ? bulletColors[Math.floor(Math.random()*bulletColors.length)] : t.color;
                            projectiles.push({ x: t.x, y: t.y, tx: targetEnemy.x, ty: targetEnemy.y, speed: 18, target: targetEnemy, dmg: dmg, color: chosenColor, type: t.type });
                            t.cd = t.fireRate;
                        }
                    }
                }
            });

            projectiles.forEach((p, idx) => {
                let d = Math.hypot(p.target.x - p.x, p.target.y - p.y);
                if (d > p.speed) { p.x += ((p.target.x - p.x) / d) * p.speed; p.y += ((p.target.y - p.y) / d) * p.speed; } 
                else {
                    let impactDmg = p.dmg;
                    if (p.type === "shuceeb") {
                        enemies.forEach(e => { if (Math.hypot(e.x - p.x, e.y - p.y) < 40) e.hp -= 2.0; });
                    }
                    p.target.hp -= impactDmg; projectiles.splice(idx, 1);
                }
            });

            enemies.forEach((e, idx) => { if (e.hp <= 0) { enemies.splice(idx, 1); cash += e.type === "boss" ? 100 : 15; updateUI(); } });

            if (waveInProgess && enemiesSpawning === 0 && enemies.length === 0) {
                waveInProgess = false; waveNum++; document.getElementById("play-btn").disabled = false; updateUI();
            }

            // RENDERING LOOPS
            ctx.clearRect(0, 0, 800, 550);

            // Path Road
            ctx.strokeStyle = "#333"; ctx.lineWidth = 44; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(path.x, path.y);
            for(let i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y); ctx.stroke();

            // Spawn gateway
            ctx.fillStyle = "#ff3300"; ctx.fillRect(0, 125, 20, 50);

            // Skittle Car Base
            ctx.fillStyle = "#ff00ff"; ctx.fillRect(750, 225, 45, 25);
            ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(760, 252, 6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(785, 252, 6, 0, Math.PI*2); ctx.fill();

            // Render Combo Electric lines
            activeCombos.forEach(c => {
                ctx.strokeStyle = "rgba(0, 255, 255, " + (c.life / 8) + ")"; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(c.sx, c.sy); ctx.lineTo(c.tx, c.ty); ctx.stroke();
            });

            drones.forEach(d => { ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(d.x, d.y, 4, 0, Math.PI*2); ctx.fill(); });

            towers.forEach(t => {
                ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(t.x, t.y, t.size, 0, Math.PI*2); ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = "#fff"; ctx.stroke();
                ctx.fillStyle = "#000"; ctx.font = "bold 10px Arial"; ctx.fillText(t.type.substring(0,2).toUpperCase(), t.x-6, t.y+4);
                if (t.type === "arafat" && t.reloadTimer > 0) { ctx.fillStyle = "red"; ctx.font = "9px Arial"; ctx.fillText("RELOAD", t.x-16, t.y-22); }
            });

            lasers.forEach(l => {
                ctx.strokeStyle = "rgba(255, 255, 255, " + (l.life / 10) + ")"; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(l.sx, l.sy); ctx.lineTo(l.tx, l.ty); ctx.stroke();
            });

            swordSlashes.forEach(s => { ctx.strokeStyle = "rgba(255, 102, 0, 0.4)"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(s.x, s.y, s.range, 0, Math.PI*2); ctx.stroke(); });

            if (selectedType) { ctx.strokeStyle = "rgba(255, 0, 255, 0.25)"; ctx.lineWidth = 2; ctx.beginPath(); let r = selectedType === "shuceeb" ? 150 : 110; ctx.arc(currentMouseX, currentMouseY, r, 0, Math.PI*2); ctx.stroke(); }

            enemies.forEach(e => {
                ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "red"; ctx.fillRect(e.x - 12, e.y - 18, 24, 3.5);
                ctx.fillStyle = "green"; ctx.fillRect(e.x - 12, e.y - 18, (e.hp / e.maxHp) * 24, 3.5);
            });

            projectiles.forEach(p => {
                ctx.fillStyle = p.color;
                if (p.type === "shuceeb") { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill(); } 
                else { ctx.fillRect(p.x - 2, p.y - 2, 5, 5); }
            });
        }

        function updateUI() {
            document.getElementById("ui-wave").innerText = waveNum;
            document.getElementById("ui-hp-fill").style.width = (baseHp / maxBaseHp) * 100 + "%";
            document.getElementById("ui-cash").innerText = cash;
            document.getElementById("btn-shuceeb").disabled = cash < 50; 
            document.getElementById("btn-aadam").disabled = cash < 125;
            document.getElementById("btn-yakoub").disabled = cash < 175;
            document.getElementById("btn-daiyon").disabled = cash < 150;
            document.getElementById("btn-arafat").disabled = cash < 200;
            document.getElementById("btn-naythan").disabled = cash < 250;
        }
    </script>
</body>
</html>
