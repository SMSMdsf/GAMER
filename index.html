<!DOCTYPE html>
<html>
<head>
    <title>Skittlini: Zombie Strike | 2D Action Arena</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        #ui-box { background: rgba(15, 20, 15, 0.9); padding: 12px; border-bottom: 3px solid #00ff00; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; align-items: center; box-shadow: 0 4px 15px rgba(0,255,0,0.2); }
        canvas { background: #111411; border: 4px solid #333; cursor: crosshair; display: block; margin: 10px auto; box-shadow: 0 0 30px rgba(0,255,0,0.15); transition: background-color 1.5s ease; }
        .badge { color: #ffff00; text-shadow: 0 0 8px #ffff00; }
        /* Movie Captions Styling Layout */
        #caption-ticker { font-size: 20px; font-weight: bold; text-transform: uppercase; margin-top: 5px; height: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- HUD STATS DASHBOARD -->
    <div id="ui-box">
        <div>OPERATOR: <span style="color: #ff00ff;">SHUCEEB</span></div>
        <div>HP: <span id="ui-hp" style="color: #ff3333;">100/100</span></div>
        <div>ROUND: <span id="ui-round" style="color: #00ffff;">1</span></div>
        <div>AMMO: <span id="ui-ammo" style="color: #ff00ff;">30/30</span></div>
        <div>KILLS: <span id="ui-kills" class="badge">0</span></div>
    </div>

    <!-- SIDE-SCROLLING CANVAS -->
    <canvas id="gameCanvas" width="900" height="460"></canvas>

    <!-- LIVE ACTION CAPTIONS FEED -->
    <div id="caption-ticker" style="color: #ff00ff; text-shadow: 0 0 8px #ff00ff;">[TACTICAL DEPLOYMENT SUCCESSFUL: PREPARE FOR COMBAT]</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Web Audio Sound Generator
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // Engine Configuration Variables
        let hp = 100, kills = 0, roundNum = 1, ammo = 30, maxAmmo = 30, reloadTimer = 0, fireCooldown = 0;
        let player = { x: 450, y: 360, vx: 0, vy: 0, size: 18, speed: 5, jumpPower: 12, grounded: true, angle: 0 };
        let bullets = [], enemies = [], keys = {}, mouseX = 450, mouseY = 250;
        const gravity = 0.5, groundY = 390;

        // Background Color Rotation Array
        const bgColors = ["#111411", "#1a0b1a", "#0b151a", "#1a160b", "#1a0b0b"];
        const gridColors = ["#00ff00", "#ff00ff", "#00ffff", "#ffff00", "#ff0000"];
        const loopCaptions = [
            "[GRID DETECTING ALIEN ACTIVITY: SHIFTING POLARITY]",
            "[MUTANT SPORES MUTATING COMPRESSION MATRIX]",
            "[TACTICAL RADAR SCANNING INTENSIVE HOSTILE WAVE]",
            "[SKITTLINI MATRIX ENERGY FIELD RECHARGING]",
            "[ALERT: HIGH DENSITY BIO-THREAT APPROACHING]"
        ];
        let colorIdx = 0;

        // Dynamic 1.5s Environment Ticker (1500 milliseconds)
        setInterval(() => {
            colorIdx = (colorIdx + 1) % bgColors.length;
            canvas.style.backgroundColor = bgColors[colorIdx];
            
            // Sync current subtitle feed to match background rotation environment
            let ticker = document.getElementById("caption-ticker");
            ticker.style.color = gridColors[colorIdx];
            ticker.style.textShadow = `0 0 8px ${gridColors[colorIdx]}`;
            ticker.innerText = loopCaptions[colorIdx];
        }, 1500);

        // Input Setup
        window.addEventListener("keydown", e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'r' && ammo < maxAmmo && reloadTimer === 0) {
                reloadTimer = 40;
                document.getElementById("caption-ticker").innerText = "[TACTICAL MAGAZINE RELOAD SEQUENCE INITIATED]";
            }
        });
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        let isMouseDown = false;
        canvas.addEventListener("mousedown", () => isMouseDown = true);
        window.addEventListener("mouseup", () => isMouseDown = false);

        function fireWeapon() {
            if (reloadTimer > 0 || fireCooldown > 0) return;
            if (ammo <= 0) { reloadTimer = 40; return; }

            ammo--;
            playSound('shoot');
            let bAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(bAngle) * 14, vy: Math.sin(bAngle) * 14 });
            fireCooldown = 5; 
            updateUI();
        }

        function spawnZombie() {
            let spawnLeft = Math.random() < 0.5;
            let eX = spawnLeft ? -20 : 920;
            enemies.push({ x: eX, y: groundY - 12, hp: 1 + Math.floor(roundNum * 0.5), speed: (spawnLeft ? 1 : -1) * (1.5 + (roundNum * 0.2)) });
            setTimeout(spawnZombie, Math.max(300, 1800 - roundNum * 150));
        }

        function gameLoop() {
            if (fireCooldown > 0) fireCooldown--;
            if (reloadTimer > 0) {
                reloadTimer--;
                if (reloadTimer === 0) { ammo = maxAmmo; updateUI(); }
            }

            player.vx = 0;
            if (keys['a']) player.vx = -player.speed;
            if (keys['d']) player.vx = player.speed;
            if (keys['w'] && player.grounded) {
                player.vy = -player.jumpPower;
                player.grounded = false;
                document.getElementById("caption-ticker").innerText = "[LEAPING ENGAGEMENT: TAKING VERTICAL ADVANTAGE]";
            }

            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.y >= groundY - player.size) {
                player.y = groundY - player.size;
                player.vy = 0;
                player.grounded = true;
            }
            if (player.x < player.size) player.x = player.size;
            if (player.x > 900 - player.size) player.x = 900 - player.size;

            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

            if (isMouseDown) fireWeapon();

            bullets.forEach((b, bIdx) => {
                b.x += b.vx; b.y += b.vy;
                if (b.x < 0 || b.x > 900 || b.y < 0 || b.y > 500) bullets.splice(bIdx, 1);

                enemies.forEach((e, eIdx) => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 16) {
                        e.hp--; playSound('hit');
                        bullets.splice(bIdx, 1);
                        if (e.hp <= 0) {
                            enemies.splice(eIdx, 1);
                            kills++;
                            if (kills % 15 === 0) { 
                                roundNum++; 
                                document.getElementById("caption-ticker").innerText = `[THREAT LEVEL ESCALATED: ENEMY STRENGTH MULTIPLIED]`;
                            } 
                            updateUI();
                        }
                    }
                });
            });

            enemies.forEach((e, idx) => {
                e.x += e.speed;
                if (Math.random() < 0.01) {
                    e.speed = (player.x > e.x ? 1 : -1) * Math.abs(e.speed);
                }

                if (Math.hypot(player.x - e.x, player.y - e.y) < player.size + 10) {
                    hp -= 0.5; updateUI();
                    if (hp <= 0) { alert("SQUAD OVERRUN! Shuceeb was defeated."); location.reload(); }
                }
            });

            // RENDER FRAME GRAPHICS WITH CYCLING GRID COLORS
            ctx.clearRect(0, 0, 900, 500);

            // Draw Matrix Grid Lines
            ctx.strokeStyle = gridColors[colorIdx] + "22"; 
            ctx.lineWidth = 1;
            for(let i=0; i<900; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,groundY); ctx.stroke(); }
            for(let j=0; j<groundY; j+=40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(900,j); ctx.stroke(); }

            // Draw Steel Floor Base
            ctx.fillStyle = "#151515"; ctx.fillRect(0, groundY, 900, 70);
            ctx.strokeStyle = gridColors[colorIdx]; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(900, groundY); ctx.stroke();

            // PLAYER MODEL DESIGN
            ctx.save();
            ctx.translate(player.x, player.y);
            
            ctx.save();
            ctx.rotate(player.angle);
            ctx.fillStyle = "#555"; ctx.fillRect(0, -3, 24, 6);
            ctx.restore();

            ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = "#e0a96d"; ctx.beginPath(); ctx.arc(0, -6, player.size * 0.4, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // Draw Bullets Lasers Particles
            ctx.fillStyle = gridColors[colorIdx]; 
            bullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 2, 5, 5));

            // Draw Running Alien Spiders
            enemies.forEach(e => {
                ctx.fillStyle = "#39e639"; ctx.beginPath(); ctx.arc(e.x, e.y, 11, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "red"; ctx.fillRect(e.x-3, e.y-4, 2, 2); ctx.fillRect(e.x+2, e.y-4, 2, 2);
            });
        }

        function updateUI() {
            document.getElementById("ui-hp").innerText = `${Math.floor(hp)}/100`;
            document.getElementById("ui-round").innerText = roundNum;
            document.getElementById("ui-ammo").innerText = reloadTimer > 0 ? "RELOADING" : `${ammo}/${maxAmmo}`;
            document.getElementById("ui-kills").innerText = kills;
        }

        spawnZombie();
        setInterval(gameLoop, 1000 / 30);
    </script>
</body>
</html>
