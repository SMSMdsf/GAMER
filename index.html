<!DOCTYPE html>
<html>
<head>
    <title>Skittlini: Black Ops | 2D Tactical Shooter</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        #ui-box { background: rgba(15, 20, 15, 0.9); padding: 12px; border-bottom: 3px solid #00ff00; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; align-items: center; box-shadow: 0 4px 15px rgba(0,255,0,0.2); }
        canvas { background: #111411; border: 4px solid #222; cursor: crosshair; display: block; margin: 20px auto; box-shadow: 0 0 30px rgba(0,255,0,0.1); }
        .badge { color: #ffff00; text-shadow: 0 0 8px #ffff00; }
    </style>
</head>
<body>

    <!-- HUD DASHBOARD -->
    <div id="ui-box">
        <div>OPERATOR: <span id="ui-name" style="color: #ff00ff;">SHUCEEB</span></div>
        <div>HP: <span id="ui-hp" style="color: #ff3333;">100/100</span></div>
        <div>WEAPON: <span id="ui-weapon" style="color: #00ffff;">M4 Carbine</span></div>
        <div>AMMO: <span id="ui-ammo" style="color: #ff00ff;">30/30</span></div>
        <div>KILLS: <span id="ui-kills" class="badge">0</span></div>
        <div>SQUAD COMPANIONS: <span id="ui-squad" style="color: #ffff00;">0/5</span></div>
    </div>

    <!-- TACTICAL COMBAT ENVIRONMENT -->
    <canvas id="shooterCanvas" width="900" height="550"></canvas>

    <script>
        const canvas = document.getElementById("shooterCanvas");
        const ctx = canvas.getContext("2d");

        // Web Audio Synth Engine
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playGunSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'fire') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        // Gameplay Constants & Arrays
        let hp = 100, kills = 0, ammo = 30, maxAmmo = 30, currentGun = "M4 Carbine", fireCooldown = 0, reloadTimer = 0;
        let player = { x: 450, y: 275, size: 18, speed: 4.5, angle: 0 };
        let bullets = [], enemies = [], crates = [], squadSaved = [];
        let keys = {}, mouseX = 450, mouseY = 275;

        // Static Rescue Coordinates for the 5 boys
        const trappedBoys = [
            { x: 150, y: 120, name: "Aadam", saved: false, color: "#ff0055" },
            { x: 750, y: 130, name: "Yakoub", saved: false, color: "#ffcc00" },
            { x: 160, y: 450, name: "Daiyon", saved: false, color: "#9900ff" },
            { x: 740, y: 460, name: "Arafat", saved: false, color: "#00ff66" },
            { x: 450, y: 80, name: "Naythan", saved: false, color: "#ff6600" }
        ];

        // Input Actions Configuration
        window.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase() === 'r' && ammo < maxAmmo && reloadTimer === 0) reloadTimer = 45; });
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener("mousemove", e => { const rect = canvas.getBoundingClientRect(); mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top; });
        
        let isMouseDown = false;
        canvas.addEventListener("mousedown", () => isMouseDown = true);
        window.addEventListener("mouseup", () => isMouseDown = false);

        function fireActiveWeapon(sx, sy, targetAngle, isAI = false) {
            if (!isAI) {
                if (reloadTimer > 0 || fireCooldown > 0) return;
                if (ammo <= 0) { reloadTimer = 45; return; }
                ammo--;
            }
            
            playGunSound('fire');
            let bSpeed = 12;

            if (currentGun === "Remington Shotgun" && !isAI) {
                bullets.push({ x: sx, y: sy, vx: Math.cos(targetAngle - 0.15) * bSpeed, vy: Math.sin(targetAngle - 0.15) * bSpeed, isAI: isAI });
                bullets.push({ x: sx, y: sy, vx: Math.cos(targetAngle) * bSpeed, vy: Math.sin(targetAngle) * bSpeed, isAI: isAI });
                bullets.push({ x: sx, y: sy, vx: Math.cos(targetAngle + 0.15) * bSpeed, vy: Math.sin(targetAngle + 0.15) * bSpeed, isAI: isAI });
                fireCooldown = 22;
            } else if (currentGun === "50 Cal Sniper" && !isAI) {
                bullets.push({ x: sx, y: sy, vx: Math.cos(targetAngle) * 18, vy: Math.sin(targetAngle) * 18, isAI: isAI, pierce: 3 });
                fireCooldown = 40;
            } else { // M4 Carbine or AI Support shots
                bullets.push({ x: sx, y: sy, vx: Math.cos(targetAngle) * 13, vy: Math.sin(targetAngle) * 13, isAI: isAI });
                fireCooldown = isAI ? 30 : 6;
            }
            updateUI();
        }

        function spawnAlienCrawler() {
            let side = Math.floor(Math.random() * 4);
            let eX = 0, eY = 0;
            if(side === 0) { eX = Math.random()*900; eY = -20; }
            else if(side === 1) { eX = 920; eY = Math.random()*550; }
            else if(side === 2) { eX = Math.random()*900; eY = 570; }
            else { eX = -20; eY = Math.random()*550; }
            enemies.push({ x: eX, y: eY, hp: 2, speed: 2.0 + Math.random() });
            setTimeout(spawnAlienCrawler, Math.max(400, 1500 - kills * 20));
        }

        function gameLoop() {
            // Processing timers
            if (fireCooldown > 0) fireCooldown--;
            if (reloadTimer > 0) {
                reloadTimer--;
                if (reloadTimer === 0) { ammo = maxAmmo; updateUI(); }
            }

            // Input Movement Controls (WASD keys vector modifiers)
            if (keys['w'] && player.y > player.size) player.y -= player.speed;
            if (keys['s'] && player.y < 555 - player.size) player.y += player.speed;
            if (keys['a'] && player.x > player.size) player.x -= player.speed;
            if (keys['d'] && player.x < 900 - player.size) player.x += player.speed;

            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

            if (isMouseDown) fireActiveWeapon(player.x, player.y, player.angle);

            // Handle Loot Crates Spawning drops logic checkpoints
            if (Math.random() < 0.003 && crates.length < 3) {
                const types = ["Remington Shotgun", "50 Cal Sniper"];
                crates.push({ x: 100 + Math.random()*700, y: 100 + Math.random()*350, type: types[Math.floor(Math.random()*types.length)] });
            }

            // Rescue Boys Verification
            trappedBoys.forEach(boy => {
                if (!boy.saved && Math.hypot(player.x - boy.x, player.y - boy.y) < player.size + 15) {
                    boy.saved = true;
                    squadSaved.push({ name: boy.name, color: boy.color, cd: 0, x: player.x, y: player.y });
                    updateUI();
                }
            });

            // Handle Companion AI Followers Combat loops tracking targets
            squadSaved.forEach((follower, index) => {
                let leaderX = index === 0 ? player.x : squadSaved[index - 1].x;
                let leaderY = index === 0 ? player.y : squadSaved[index - 1].y;
                let d = Math.hypot(leaderX - follower.x, leaderY - follower.y);
                
                if (d > 35) {
                    follower.x += ((leaderX - follower.x) / d) * 4.0;
                    follower.y += ((leaderY - follower.y) / d) * 4.0;
                }

                if (follower.cd > 0) follower.cd--;
                if (follower.cd === 0 && enemies.length > 0) {
                    let nearestE = enemies[0];
                    let closestD = Math.hypot(nearestE.x - follower.x, nearestE.y - follower.y);
                    enemies.forEach(e => {
                        let currentD = Math.hypot(e.x - follower.x, e.y - follower.y);
                        if(currentD < closestD) { closestD = currentD; nearestE = e; }
                    });
                    if (closestD < 250) {
                        let eAngle = Math.atan2(nearestE.y - follower.y, nearestE.x - follower.x);
                        fireWeapon(follower.x, follower.y, eAngle, true);
                        follower.cd = 30;
                    }
                }
            });

            // Projectile Physics Translators
            bullets.forEach((b, bIdx) => {
                b.x += b.vx; b.y += b.vy;
                if (b.x < 0 || b.x > 900 || b.y < 0 || b.y > 550) bullets.splice(bIdx, 1);

                enemies.forEach((e, eIdx) => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 18) {
                        e.hp--; playSound('hit');
                        if (!b.pierce) bullets.splice(bIdx, 1);
                        else { b.pierce--; if(b.pierce <= 0) bullets.splice(bIdx, 1); }

                        if (e.hp <= 0) { enemies.splice(eIdx, 1); kills++; updateUI(); }
                    }
                });
            });

            // Alien Chasing AI Navigation loop properties
            enemies.forEach((e, idx) => {
                let eAngle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(eAngle) * e.speed; e.y += Math.sin(eAngle) * e.speed;

                if (Math.hypot(player.x - e.x, player.y - e.y) < player.size + 10) {
                    hp -= 0.4; updateUI();
                    if (hp <= 0) { alert("TACTICAL DEFEAT! Shuceeb was overwhelmed."); location.reload(); }
                }
            });

            // Scavenge verification loop check
            crates.forEach((c, idx) => {
                if (Math.hypot(player.x - c.x, player.y - c.y) < player.size + 15) {
                    currentGun = c.type; maxAmmo = c.type === "50 Cal Sniper" ? 5 : 8; ammo = maxAmmo;
                    crates.splice(idx, 1); updateUI();
                }
            });

            // RENDERING LOOPS
            ctx.clearRect(0, 0, 900, 550);

            // Draw Background Grids Tactical Grid Floor Map
            ctx.strokeStyle = "#162016"; ctx.lineWidth = 1;
            for(let i=0; i<900; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,550); ctx.stroke(); }
            for(let j=0; j<550; j+=50) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(900,j); ctx.stroke(); }

            // Draw Loot Weapons Crates
            crates.forEach(c => {
                ctx.fillStyle = "#00ffff"; ctx.fillRect(c.x-10, c.y-10, 20, 20);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(c.x-10, c.y-10, 20, 20);
                ctx.fillStyle = "#fff"; ctx.font = "9px Arial"; ctx.fillText("CRATE", c.x-14, c.y-14);
            });

            // Draw Trapped Boys Nodes (Waiting Rescue positions)
            trappedBoys.forEach(boy => {
                if (!boy.saved) {
                    ctx.fillStyle = boy.color; ctx.beginPath(); ctx.arc(boy.x, boy.y, 14, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.fillText(boy.name[0], boy.x-3, boy.y+4);
                }
            });

            // Render Companions Followers Lines
            squadSaved.forEach(f => {
                ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
            });

            // PLAYER MODEL OPERATOR BODY (Top-Down POV setup structure)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = "#444"; ctx.fillRect(6, -4, 26, 6); // Weapon Rifle Barrel frame length
            ctx.fillStyle = "#ff00ff"; // Shuceeb Operator Signature deep magenta profile
            ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI*2); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = "#fff"; ctx.stroke();
            ctx.fillStyle = "#e0a96d"; ctx.beginPath(); ctx.arc(0, 0, player.size*0.5, 0, Math.PI*2); ctx.fill(); // Head circle
            ctx.restore();

            // Draw Projectiles
            bullets.forEach(b => { ctx.fillStyle = currentGun === "50 Cal Sniper" ? "#ffcc00" : "#00ffff"; ctx.fillRect(b.x-2, b.y-2, 5, 5); });

            // Draw Alien Spiders
            enemies.forEach(e => {
                ctx.fillStyle = "#39e639"; ctx.beginPath(); ctx.arc(e.x, e.y, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#000"; ctx.fillRect(e.x-3, e.y-3, 2, 2); ctx.fillRect(e.x+2, e.y-3, 2, 2); // Alien facial elements
            });

            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById("ui-hp").innerText = Math.floor(hp) + "/100";
            document.getElementById("ui-weapon").innerText = currentGun;
            document.getElementById("ui-ammo").innerText = reloadTimer > 0 ? "RELOADING" : `${ammo}/${maxAmmo}`;
            document.getElementById("ui-kills").innerText = kills;
            document.getElementById("ui-squad").innerText = `${squadSaved.length}/5`;
        }

        // Initialize Call of Duty 2D Engine Grid Simulation Loop
        spawnAlienCrawler();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
