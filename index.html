<!DOCTYPE html>
<html>
<head>
    <title>Zombie.io | Survival Squad: Endless Leaderboard</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        #game-wrapper { perspective: 1000px; perspective-origin: 50% 20%; width: 100vw; height: 85vh; display: none; position: relative; }
        canvas { background: #111411; border: 4px solid #ff3300; cursor: crosshair; margin: 30px auto; display: block; box-shadow: 0 20px 40px rgba(255, 51, 0, 0.5); transform: rotateX(45deg); transform-style: preserve-3d; }
        .screen { padding: 40px; max-width: 700px; margin: auto; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow-y: auto; }
        .char-btn { padding: 12px; margin: 6px; background: #1a1a1a; color: #00ff00; border: 2px solid #00ff00; cursor: pointer; font-size: 14px; width: 260px; text-transform: uppercase; font-weight: bold; }
        .char-btn:hover { background: #00ff00; color: black; box-shadow: 0 0 15px #00ff00; }
        #ui-box { background: rgba(0,0,0,0.9); padding: 12px; border-bottom: 3px solid #ff3300; display: none; justify-content: space-around; font-size: 16px; font-weight: bold; align-items: center; }
        .btn-upgrade { background: #ff3300; color: white; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-upgrade:disabled { background: #444; color: #777; cursor: not-allowed; }
        .btn-menu { background: #ffcc00; color: black; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        #cutscene-text { font-size: 22px; line-height: 1.6; color: #ffffff; text-shadow: 0 0 8px #ff0000; min-height: 150px; }
        .next-btn { background: #fff; color: #000; border: none; padding: 10px 25px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .hp-bar-container { width: 100px; background: #330000; border: 2px solid #ff0000; height: 14px; border-radius: 4px; display: inline-block; vertical-align: middle; }
        #ui-hp-fill { width: 100%; background: #00ff00; height: 100%; }
        
        /* Pause Overlay Menu Container Frame Layout */
        #pause-overlay { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 999; flex-direction: column; justify-content: center; align-items: center; }
        .pause-btn { padding: 15px 40px; margin: 12px; font-size: 20px; font-weight: bold; border: 3px solid #fff; cursor: pointer; width: 250px; }
        
        input[type="text"] { background: #111; border: 2px solid #00ff00; color: #00ff00; padding: 10px; font-size: 18px; text-align: center; font-family: monospace; width: 250px; margin-bottom: 15px; }
        #leaderboard-box { background: #111; border: 2px solid #ffcc00; padding: 15px; width: 320px; max-height: 180px; overflow-y: auto; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

    <!-- CUTSCENE SCREEN -->
    <div id="cutscene-screen" class="screen">
        <h2 style="color: #ff3300; font-size: 32px;">⚠️ EMERGENCY BROADCAST ⚠️</h2>
        <div id="cutscene-text">Loading transmission...</div>
        <button id="cutscene-btn" class="next-btn" onclick="nextCutscene()">NEXT</button>
    </div>

    <!-- CHARACTER SELECTION & ENDLESS REGISTRATION MENU -->
    <div id="menu-screen" class="screen" style="display:none;">
        <h1>THE OUTBREAK HAS BEGUN</h1>
        
        <label for="custom-name" style="font-weight:bold; margin-bottom:5px;">CUSTOM TAG (OPTIONAL):</label>
        <input type="text" id="custom-name" placeholder="Enter Name... e.g. John">

        <h3>SELECT YOUR SURVIVOR PRESET:</h3>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 600px;">
            <button class="char-btn" onclick="startGame('Shuceeb', '#00ffff', 'speed')">Shuceeb (Super Speed)</button>
            <button class="char-btn" onclick="startGame('Aadam', '#ff0055', 'tank')">Aadam (Heavy Armor)</button>
            <button class="char-btn" onclick="startGame('Yakoub', '#ffcc00', 'looter')">Yakoub (Double Cash)</button>
            <button class="char-btn" onclick="startGame('Daiyon', '#9900ff', 'tactical')">Daiyon (Gun Lvl 5 Start)</button>
            <button class="char-btn" onclick="startGame('Arafat', '#00ff66', 'medic')">Arafat (Auto Heal)</button>
            <button class="char-btn" onclick="startGame('Naythan', '#ff6600', 'lucky')">Naythan (Insta-Kill Chance)</button>
        </div>

        <div id="leaderboard-box">
            <h4 style="margin:0 0 10px 0; color:#ffcc00; text-align:center;">🏆 SURVIVOR LEADERBOARD</h4>
            <div id="leaderboard-entries">No records found yet.</div>
        </div>
    </div>

    <!-- GAME UI HUD INTERFACE -->
    <div id="ui-box">
        <button class="btn-menu" onclick="togglePause()">PAUSE (P)</button>
        <div>User: <span id="ui-name" style="color:yellow;">---</span></div>
        <div>Round: <span id="ui-round" style="color:#ffcc00;">1</span>/100</div>
        <div>HP: <div class="hp-bar-container"><div id="ui-hp-fill"></div></div></div>
        <div>Weapon: <span id="ui-weapon" style="color: #ffcc00;">M1911 Pistol</span></div>
        <div>Ammo: <span id="ui-ammo" style="color: #ff00ff;">7/7</span> <span id="ui-reloading" style="color: red; display: none;">[RELOADING]</span></div>
        <div>Gun Level: <span id="ui-lvl">1</span></div>
        <div>Cash: $<span id="ui-cash">0</span></div>
        <button id="up-btn" class="btn-upgrade" onclick="buyUpgrade()">UPGRADE GUN ($50)</button>
    </div>

    <!-- TACTICAL PAUSE MODAL RING -->
    <div id="pause-overlay">
        <h1 style="color:#fff; font-size:48px; text-shadow:0 0 15px #00ff00; margin-bottom:30px;">GAME PAUSED</h1>
        <button class="pause-btn" style="background:#00ff00; color:#000;" onclick="togglePause()">RESUME ACTION</button>
        <button class="pause-btn" style="background:#ff3300; color:#fff;" onclick="returnToMenu()">LEAVE GAME (QUIT)</button>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="550"></canvas>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(lvl >= 10 ? 110 : 180, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } else if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(60, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'reload') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            }
        }

        const cutsceneLines = [
            "[SCENE 1: THE HOMEFRONT]\n\nShuceeb, Aadam, Yakoub, Daiyon, Arafat, and Naythan were chilled out at their house playing video games together...",
            "[SCENE 2: INTERRUPTION]\n\nSuddenly, the power cuts out! The TV flashes deep white static, forcing an emergency news transmission onto the screen.",
            "[SCENE 3: TRUMP BROADCAST]\n\nMr. Trump appears on camera, visibly sweating: 'My fellow Americans... a rogue scientist inside our classified labs accidentally cracked open a secret Alien Egg asset...'",
            "[SCENE 4: MOBILIZATION]\n\nThe viral spore is turning citizens into mutants! Blood-curdling screeches fill the street outside. Grab your tactical firearms!'"
        ];
        let cutsceneIdx = 0;
        function nextCutscene() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            cutsceneIdx++;
            if (cutsceneIdx < cutsceneLines.length) {
                document.getElementById("cutscene-text").innerText = cutsceneLines[cutsceneIdx];
                if (cutsceneIdx === cutsceneLines.length - 1) document.getElementById("cutscene-btn").innerText = "START SURVIVAL SQUAD";
            } else {
                document.getElementById("cutscene-screen").style.display = "none";
                document.getElementById("menu-screen").style.display = "flex";
                loadLeaderboard();
            }
        }
        document.getElementById("cutscene-text").innerText = cutsceneLines;

        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        let cash = 0, lvl = 1, cost = 50, hp = 100, currentWeapon = "M1911 Pistol";
        let player = { x: 400, y: 275, size: 20, color: '#00ffff', speed: 4, angle: 0, perk: '', name: '' };
        let bullets = [], enemyBullets = [], zombies = [], bosses = [];
        let keys = {}, mouseX = 0, mouseY = 0;
        let isGameRunning = false, isPaused = false, zombieInterval, medicInterval;
        let bossActive = false, currentRound = 1, zombiesKilledInRound = 0;
        
        let currentAmmo = 7, maxAmmo = 7, isReloading = false, reloadTimer = 0, weaponCooldown = 0;
        let tier1Defeated = false, tier2Defeated = false, tier3Defeated = false, tier4Defeated = false;

        function startGame(presetName, color, perk) {
            let inputName = document.getElementById("custom-name").value.trim();
            player.name = inputName !== "" ? inputName : presetName;
            
            cash = 0; lvl = 1; cost = 50; hp = 100; currentWeapon = "M1911 Pistol"; currentRound = 1; zombiesKilledInRound = 0;
            bullets = []; enemyBullets = []; zombies = []; bosses = []; keys = {}; bossActive = false; isPaused = false;
            tier1Defeated = false; tier2Defeated = false; tier3Defeated = false; tier4Defeated = false;
            isReloading = false; reloadTimer = 0; weaponCooldown = 0;
            player.x = 400; player.y = 275; player.color = color; player.perk = perk;
            player.speed = perk === 'speed' ? 5.5 : 4;
            if (perk === 'tactical') { lvl = 5; cost = 120; }
            
            checkWeaponTier(); currentAmmo = maxAmmo; updateUI();
            document.getElementById("ui-name").innerText = player.name;
            document.getElementById("ui-name").style.color = color;
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("ui-box").style.display = "flex";
            document.getElementById("game-wrapper").style.display = "block";
            document.getElementById("pause-overlay").style.display = "none";
            
            isGameRunning = true;
            zombieInterval = setTimeout(spawnZombie, 1000);
            if (perk === 'medic') medicInterval = setInterval(() => { if(hp < 100 && !isPaused && isGameRunning) { hp = Math.min(100, hp + 5); updateUI(); } }, 3000);
            
            requestAnimationFrame(gameLoop);
        }

        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
            document.getElementById("pause-overlay").style.display = isPaused ? "flex" : "none";
        }

        function returnToMenu() {
            isGameRunning = false; isPaused = false;
            clearTimeout(zombieInterval); clearInterval(medicInterval);
            document.getElementById("ui-box").style.display = "none";
            document.getElementById("game-wrapper").style.display = "none";
            document.getElementById("pause-overlay").style.display = "none";
            document.getElementById("menu-screen").style.display = "flex";
            loadLeaderboard();
        }

        function saveScore() {
            let scores = JSON.parse(localStorage.getItem("zombie_scores")) || [];
            scores.push({ name: player.name, round: currentRound, gunLvl: lvl });
            scores.sort((a, b) => b.round - a.round);
            localStorage.setItem("zombie_scores", JSON.stringify(scores.slice(0, 10)));
        }

        function loadLeaderboard() {
            let scores = JSON.parse(localStorage.getItem("zombie_scores")) || [];
            let container = document.getElementById("leaderboard-entries");
            if(scores.length === 0) { container.innerHTML = "No entries yet. Surviving past Round 100 triggers automated legends validation."; return; }
            let html = "<ol style='padding-left:20px; margin:0;'>";
            scores.forEach(s => {
                let badge = s.gunLvl >= 100 ? " ⭐[GOD]" : "";
                html += `<li style='margin-bottom:4px;'><b>${s.name}</b> - Round ${s.round} (Gun Lvl ${s.gunLvl})${badge}</li>`;
            });
            html += "</ol>"; container.innerHTML = html;
        }

        function buyUpgrade() {
            if (cash >= cost && lvl < 100) {
                cash -= cost; lvl++; cost = Math.floor(cost * 1.25);
                player.speed += player.perk === 'speed' ? 0.3 : 0.2;
                checkWeaponTier();
                if (lvl % 10 === 0) triggerMilestoneBoss();
                updateUI();
            }
        }

        function triggerMilestoneBoss() {
            bossActive = true; zombies = [];
            let multiplier = lvl / 10;
            bosses.push({ x: 400, y: -50, hp: 40 + (multiplier * 40), maxHp: 40 + (multiplier * 40), size: 35 + (multiplier * 5), speed: 0.6 + (multiplier * 0.1), tier: multiplier });
        }

        function checkWeaponTier() {
            if (lvl >= 50) { currentWeapon = "Tactical Mini-Gun"; maxAmmo = 100; }
            else if (lvl >= 35) { currentWeapon = "Laser Railgun"; maxAmmo = 3; }
            else if (lvl >= 20) { currentWeapon = "Plasma Rifle"; maxAmmo = 30; }
            else if (lvl >= 10) { currentWeapon = "Remington Shotgun"; maxAmmo = 5; }
            else { currentWeapon = "M1911 Pistol"; maxAmmo = 7; }
            document.getElementById("ui-weapon").innerText = currentWeapon;
        }

        window.addEventListener("keydown", e => { 
            if(!isGameRunning) return;
            if(e.key.toLowerCase() === 'p' || e.key === 'Escape') { togglePause(); return; }
            if(!isPaused) keys[e.key.toLowerCase()] = true; 
            if(e.key.toLowerCase() === 'r' && !isReloading && currentAmmo < maxAmmo && !isPaused) startManualReload();
        });
        window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
        window.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = ((e.clientX - rect.left) / rect.width) * canvas.width;
            mouseY = (((e.clientY - rect.top) / rect.height) * canvas.height) * 1.5 - 120; 
        });
        canvas.addEventListener("mousedown", () => { if(isGameRunning && !isPaused) fireWeapon(); });

        function startManualReload() {
            isReloading = true;
            if(currentWeapon === "Tactical Mini-Gun") reloadTimer = 150;
            else if(currentWeapon === "Laser Railgun") reloadTimer = 120;
            else if(currentWeapon === "Remington Shotgun") reloadTimer = 90;
            else reloadTimer = 50;
            playSound('reload'); document.getElementById("ui-reloading").style.display = "inline";
        }

        function fireWeapon() {
            if (isReloading || weaponCooldown > 0 || isPaused) return;
            if (currentAmmo <= 0) { startManualReload(); return; }
            currentAmmo--; playSound('shoot');
            const baseAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
            let bDamage = 1 + Math.floor(lvl / 8);

            if (currentWeapon === "M1911 Pistol") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*8, vy: Math.sin(baseAngle)*8, dmg: bDamage, color: "#ffff00", life: 1, size: 7 }); weaponCooldown = 15;
            } else if (currentWeapon === "Remington Shotgun") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle-0.2)*8, vy: Math.sin(baseAngle-0.2)*8, dmg: bDamage, color: "#ff3300", life: 1, size: 6 });
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*8, vy: Math.sin(baseAngle)*8, dmg: bDamage, color: "#ff3300", life: 1, size: 6 });
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle+0.2)*8, vy: Math.sin(baseAngle+0.2)*8, dmg: bDamage, color: "#ff3300", life: 1, size: 6 });
                weaponCooldown = 35;
            } else if (currentWeapon === "Plasma Rifle") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*10, vy: Math.sin(baseAngle)*10, dmg: bDamage * 1.5, color: "#00ffff", life: 1, size: 10 }); weaponCooldown = 8;
            } else if (currentWeapon === "Laser Railgun") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*12, vy: Math.sin(baseAngle)*12, dmg: bDamage * 2, color: "#00ff00", life: 4, size: 5 }); weaponCooldown = 50;
            } else if (currentWeapon === "Tactical Mini-Gun") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle-0.05)*11, vy: Math.sin(baseAngle-0.05)*11, dmg: bDamage, color: "magenta", life: 1, size: 6 });
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle+0.05)*11, vy: Math.sin(baseAngle+0.05)*11, dmg: bDamage, color: "orange", life: 1, size: 6 });
                weaponCooldown = 4;
            }
            updateUI();
        }

        function spawnZombie() {
            if(!isGameRunning) return;
            if(!bossActive && !isPaused) {
                let side = Math.floor(Math.random() * 4); let rand = Math.random();
                let z = { x: 0, y: 0, hp: 1 + Math.floor(currentRound/4), maxHp: 1 + Math.floor(currentRound/4), speed: 1.4 + (currentRound*0.015), color: "#39e639", type: "normal", shootCooldown: 0 };
                if(side === 0) { z.x = Math.random()*800; z.y = -30; }
                else if(side === 1) { z.x = 830; z.y = Math.random()*550; }
                else if(side === 2) { z.x = Math.random()*800; z.y = 580; }
                else { z.x = -30; z.y = Math.random()*550; }

                if (tier4Defeated || currentRound >= 40 && rand < 0.12) { z.color = "#9900ff"; z.type = "purple_gunner"; z.speed = 1.3; }
                else if (tier3Defeated || currentRound >= 30 && rand < 0.36) { z.color = "#ff6600"; z.type = "orange_brute"; z.hp *= 2.4; z.maxHp *= 2.4; z.speed = 1.0; }
                else if (tier2Defeated || currentRound >= 20 && rand < 0.45) { z.color = "#0055ff"; z.type = "blue_sprinter"; z.speed *= 1.45; }
                else if (tier1Defeated || currentRound >= 10 && rand < 0.80) { z.color = "#ff0000"; z.type = "red_stalker"; z.hp *= 1.25; z.maxHp *= 1.25; }
                zombies.push(z);
            }
            zombieInterval = setTimeout(spawnZombie, Math.max(100, 1400 - (currentRound * 15)));
        }

        function gameLoop() {
            if(!isGameRunning) return;
            if(!isPaused) {
                ctx.clearRect(0, 0, 800, 550);
                if(weaponCooldown > 0) weaponCooldown--;

                if (isReloading) {
                    reloadTimer--;
                    if (reloadTimer <= 0) { currentAmmo = maxAmmo; isReloading = false; document.getElementById("ui-reloading").style.display = "none"; updateUI(); }
                }

                if (keys['w'] && player.y > player.size) player.y -= player.speed;
                if (keys['s'] && player.y < 550 - player.size) player.y += player.speed;
                if (keys['a'] && player.x > player.size) player.x -= player.speed;
                if (keys['d'] && player.x < 800 - player.size) player.x += player.speed;
                player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

                // Grid lines
                ctx.strokeStyle = "#223322"; ctx.lineWidth = 1;
                for(let i=0; i<800; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,550); ctx.stroke(); }
                for(let j=0; j<550; j+=40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(800,j); ctx.stroke(); }

                // Player Vector Mesh Layout
                ctx.save();
                ctx.fillStyle = "red"; ctx.fillRect(player.x - 20, player.y - 32, 40, 5);
                ctx.fillStyle = "#00ff00"; ctx.fillRect(player.x - 20, player.y - 32, (hp / 100) * 40, 5);
                ctx.translate(player.x, player.y); ctx.rotate(player.angle);
                ctx.fillStyle = "#555"; ctx.fillRect(5, -5, 25, 6);
                ctx.fillStyle = player.color; ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#e0a96d"; ctx.beginPath(); ctx.arc(0, 0, player.size*0.6, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                // Bullets Physics
                bullets.forEach((b, bIdx) => {
                    b.x += b.vx; b.y += b.vy; ctx.fillStyle = b.color;
                    ctx.fillRect(b.x - Math.floor(b.size/2), b.y - Math.floor(b.size/2), b.size, b.size);
                    if (b.x < 0 || b.x > 800 || b.y < 0 || b.y > 550) bullets.splice(bIdx, 1);

                    zombies.forEach((z, zIdx) => {
                        if (Math.hypot(b.x - z.x, b.y - z.y) < 22) {
                            let dealt = b.dmg; if (player.perk === 'lucky' && Math.random() < 0.12) dealt = 999;
                            z.hp -= dealt; b.life--; playSound('hit');
                            if (z.hp <= 0) {
                                zombies.splice(zIdx, 1); cash += player.perk === 'looter' ? 30 : 15; zombiesKilledInRound++;
                                if(zombiesKilledInRound >= 8 + (currentRound * 2)) { currentRound++; zombiesKilledInRound = 0; }
                                updateUI();
                            }
                            if (b.life <= 0) bullets.splice(bIdx, 1);
                        }
                    });

                    bosses.forEach((boss, bossIdx) => {
                        if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size) {
                            boss.hp -= b.dmg; b.life--; playSound('hit');
                            if (boss.hp <= 0) {
                                if(boss.tier === 1) tier1Defeated = true; if(boss.tier === 2) tier2Defeated = true;
                                if(boss.tier === 3) tier3Defeated = true; if(boss.tier === 4) tier4Defeated = true;
                                bosses.splice(bossIdx, 1); cash += player.perk === 'looter' ? 300 : 150; bossActive = false;
                                currentRound++; zombiesKilledInRound = 0; updateUI();
                            }
                            if (b.life <= 0) bullets.splice(bIdx, 1);
                        }
                    });
                });

                // Enemy Bullet Projectiles
                ctx.fillStyle = "#ff00ff";
                enemyBullets.forEach((eb, ebIdx) => {
                    eb.x += eb.vx; eb.y += eb.vy; ctx.fillRect(eb.x - 3, eb.y - 3, 6, 6);
                    if (eb.x < 0 || eb.x > 800 || eb.y < 0 || eb.y > 550) enemyBullets.splice(ebIdx, 1);
                    if (Math.hypot(eb.x - player.x, eb.y - player.y) < player.size) {
                        hp -= player.perk === 'tank' ? 2 : 4; enemyBullets.splice(ebIdx, 1); updateUI();
                        if(hp <= 0) { isGameRunning = false; saveScore(); alert("ELIMINATED! Round Reached: " + currentRound); returnToMenu(); }
                    }
                });

                // Zombie Entities Rendering
                zombies.forEach((z, zIdx) => {
                    let zAngle = Math.atan2(player.y - z.y, player.x - z.x); z.x += Math.cos(zAngle) * z.speed; z.y += Math.sin(zAngle) * z.speed;
                    ctx.fillStyle = z.color; ctx.beginPath(); ctx.arc(z.x, z.y, 14, 0, Math.PI*2); ctx.fill();

                    if (z.type === "purple_gunner") {
                        ctx.save
