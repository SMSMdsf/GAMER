<!DOCTYPE html>
<html>
<head>
    <title>Zombie.io | Survival Squad: Global Edition</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        #game-wrapper { perspective: 1000px; perspective-origin: 50% 20%; width: 100vw; height: 85vh; display: none; }
        canvas { background: #111411; border: 4px solid #ff3300; cursor: crosshair; margin: 30px auto; box-shadow: 0 20px 40px rgba(255, 51, 0, 0.5); transform: rotateX(45deg); transform-style: preserve-3d; }
        .screen { padding: 40px; max-width: 700px; margin: auto; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; }
        .char-btn { padding: 12px; margin: 6px; background: #1a1a1a; color: #00ff00; border: 2px solid #00ff00; cursor: pointer; font-size: 15px; width: 230px; text-transform: uppercase; font-weight: bold; }
        .char-btn:hover { background: #00ff00; color: black; box-shadow: 0 0 15px #00ff00; }
        #ui-box { background: rgba(0,0,0,0.9); padding: 12px; border-bottom: 3px solid #ff3300; display: none; justify-content: space-around; font-size: 16px; font-weight: bold; align-items: center; }
        .btn-upgrade { background: #ff3300; color: white; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-upgrade:disabled { background: #444; color: #777; cursor: not-allowed; }
        .btn-menu { background: #ffaa00; color: black; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        #cutscene-text { font-size: 22px; line-height: 1.6; color: #ffffff; text-shadow: 0 0 8px #ff0000; min-height: 150px; }
        .next-btn { background: #fff; color: #000; border: none; padding: 10px 25px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .hp-bar-container { width: 100px; background: #330000; border: 2px solid #ff0000; height: 14px; border-radius: 4px; display: inline-block; vertical-align: middle; }
        #ui-hp-fill { width: 100%; background: #00ff00; height: 100%; }
        /* Pop-up Modals Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 3px solid #00ff00; padding: 30px; border-radius: 8px; max-width: 450px; width: 100%; text-align: center; box-shadow: 0 0 25px #00ff00; }
        .leaderboard-list { text-align: left; background: #050505; border: 1px solid #333; padding: 10px; margin: 15px 0; height: 180px; overflow-y: auto; font-size: 14px; color: #fff; }
        .name-input { padding: 10px; font-size: 16px; background: #222; color: #00ff00; border: 2px solid #00ff00; text-align: center; margin-bottom: 15px; text-transform: uppercase; width: 80%; }
    </style>
</head>
<body>

    <!-- STORY CAPTIONS LAYER -->
    <div id="cutscene-screen" class="screen">
        <h2 style="color: #ff3300; font-size: 32px;">⚠️ EMERGENCY BROADCAST ⚠️</h2>
        <div id="cutscene-text">Setting connection parameters...</div>
        <button id="cutscene-btn" class="next-btn" onclick="nextCutscene()">NEXT</button>
    </div>

    <!-- MAIN CHARACTER SQUAD CONFIGURATION MENU -->
    <div id="menu-screen" class="screen" style="display:none;">
        <h1>THE OUTBREAK HAS BEGUN</h1>
        <input type="text" id="player-custom-name" class="name-input" placeholder="ENTER YOUR SURVIVOR NAME" maxlength="12">
        <h3>SELECT YOUR SURVIVOR MODEL & ABILITY:</h3>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 600px;">
            <button class="char-btn" onclick="startGame('Shuceeb', '#00ffff', 'speed')">Shuceeb (Super Speed)</button>
            <button class="char-btn" onclick="startGame('Aadam', '#ff0055', 'tank')">Aadam (Heavy Armor)</button>
            <button class="char-btn" onclick="startGame('Yakoub', '#ffcc00', 'looter')">Yakoub (Double Cash)</button>
            <button class="char-btn" onclick="startGame('Daiyon', '#9900ff', 'tactical')">Daiyon (Gun Lvl 5 Start)</button>
            <button class="char-btn" onclick="startGame('Arafat', '#00ff66', 'medic')">Arafat (Auto Heal)</button>
            <button class="char-btn" onclick="startGame('Naythan', '#ff6600', 'lucky')">Naythan (Insta-Kill Chance)</button>
        </div>
        <button class="char-btn" style="border-color: #ffaa00; color: #ffaa00; margin-top: 20px;" onclick="toggleLeaderboardModal(true)">VIEW GLOBAL LEADERBOARD</button>
    </div>

    <!-- PAUSE WINDOW MODAL SCREEN -->
    <div id="pause-modal" class="modal">
        <div class="modal-content">
            <h1 style="color: #ffaa00; margin-top:0;">GAME PAUSED</h1>
            <p style="color: #bbb;">Tactical simulation frozen.</p>
            <button class="char-btn" onclick="togglePauseGame(false)">RESUME COMBAT</button><br>
            <button class="char-btn" style="border-color:#ff3300; color:#ff3300;" onclick="leaveActiveGame()">LEAVE GAME</button>
        </div>
    </div>

    <!-- GLOBAL HIGH SCORES LEADERBOARD MODAL -->
    <div id="leaderboard-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: #00ff00; margin-top:0;">🏆 ENDLESS SURVIVAL RECORDS</h2>
            <div id="leaderboard-container" class="leaderboard-list">Loading files...</div>
            <button class="char-btn" onclick="toggleLeaderboardModal(false)">CLOSE RECORDS</button>
        </div>
    </div>

    <!-- ACTIVE HUD INTERFACE AND HEADS-UP DISPLAY -->
    <div id="ui-box">
        <button class="btn-menu" onclick="togglePauseGame(true)">PAUSE</button>
        <div>Survivor: <span id="ui-name" style="color:yellow;">---</span></div>
        <div>HP: <div class="hp-bar-container"><div id="ui-hp-fill"></div></div></div>
        <div>Round: <span id="ui-round" style="color: #ff3300;">1</span>/100</div>
        <div>Weapon: <span id="ui-weapon" style="color: #ffcc00;">M1911 Pistol</span></div>
        <div>Ammo: <span id="ui-ammo" style="color: #ff00ff;">7/7</span> <span id="ui-reloading" style="color: red; display: none;">[RELOAD]</span></div>
        <div>Cash: $<span id="ui-cash">0</span></div>
        <button id="up-btn" class="btn-upgrade" onclick="buyUpgrade()">UPGRADE GUN ($50)</button>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="550"></canvas>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(lvl >= 10 ? 110 : 180, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } else if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(60, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'reload') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        const cutsceneLines = [
            "[SCENE 1: THE HOMEFRONT]\n\nShuceeb, Aadam, Yakoub, Daiyon, Arafat, and Naythan were chilled out at their house playing video games together...",
            "[SCENE 2: INTERRUPTION]\n\nSuddenly, the power cuts out! The TV flashes deep white static, forcing an emergency news transmission onto the screen.",
            "[SCENE 3: TRUMP BROADCAST]\n\nMr. Trump appears on camera, visibly sweating: 'My fellow Americans... a rogue scientist inside our classified labs accidentally cracked open a secret Alien Egg asset...'",
            "[SCENE 4: MOBILIZATION]\n\nThe viral spore is turning citizens into mutants! Blood-curdling screeches fill the street outside. Grab your tactical firearms!'"
        ];
        let cutsceneIdx = 0;

        function showCaption() {
            document.getElementById("cutscene-text").innerText = cutsceneLines[cutsceneIdx];
            document.getElementById("cutscene-btn").innerText = cutsceneIdx === cutsceneLines.length - 1 ? "START SURVIVAL SQUAD" : "NEXT CAPTION";
        }
        function nextCutscene() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            cutsceneIdx++;
            if (cutsceneIdx < cutsceneLines.length) { showCaption(); } 
            else { document.getElementById("cutscene-screen").style.display = "none"; document.getElementById("menu-screen").style.display = "flex"; loadLeaderboardData(); }
        }
        showCaption();

        // Canvas Engine Parameters Map Configuration
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let cash = 0, lvl = 1, cost = 50, hp = 100, currentWeapon = "M1911 Pistol", currentRound = 1;
        let player = { x: 400, y: 275, size: 20, color: '#00ffff', speed: 4, angle: 0, perk: '', customName: '' };
        let bullets = [], enemyBullets = [], zombies = [], bosses = [];
        let keys = {}, mouseX = 0, mouseY = 0;
        let isGameRunning = false, isPaused = false, zombieInterval, medicInterval;
        let bossActive = false, enemiesDefeatedInRound = 0, roundSpawnTotal = 10;
        
        let currentAmmo = 7, maxAmmo = 7, isReloading = false, reloadTimer = 0, weaponCooldown = 0;
        let tier1Defeated = false, tier2Defeated = false, tier3Defeated = false, tier4Defeated = false;

        function startGame(baseModelName, color, perk) {
            let enteredName = document.getElementById("player-custom-name").value.trim().toUpperCase();
            player.customName = enteredName || baseModelName.toUpperCase();
            
            cash = 0; lvl = 1; cost = 50; hp = 100; currentWeapon = "M1911 Pistol"; currentRound = 1;
            enemiesDefeatedInRound = 0; roundSpawnTotal = 10;
            bullets = []; enemyBullets = []; zombies = []; bosses = []; keys = {}; bossActive = false;
            tier1Defeated = false; tier2Defeated = false; tier3Defeated = false; tier4Defeated = false;
            isReloading = false; reloadTimer = 0; weaponCooldown = 0; isPaused = false;
            
            player.x = 400; player.y = 275; player.color = color; player.perk = perk;
            player.speed = perk === 'speed' ? 5.5 : 4;
            if (perk === 'tactical') { lvl = 5; cost = 120; }
            
            checkWeaponTier();
            currentAmmo = maxAmmo;
            updateUI();

            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("ui-box").style.display = "flex";
            document.getElementById("game-wrapper").style.display = "block";
            
            isGameRunning = true;
            zombieInterval = setTimeout(spawnZombie, 1000);
            if (perk === 'medic') medicInterval = setInterval(() => { if(!isPaused && hp < 100) { hp = Math.min(100, hp + 5); updateUI(); } }, 3000);
            
            requestAnimationFrame(gameLoop);
        }

        function togglePauseGame(pauseState) {
            if (!isGameRunning) return;
            isPaused = pauseState;
            document.getElementById("pause-modal").style.display = pauseState ? "flex" : "none";
        }

        function leaveActiveGame() {
            isGameRunning = false;
            togglePauseGame(false);
            clearTimeout(zombieInterval);
            clearInterval(medicInterval);
            document.getElementById("ui-box").style.display = "none";
            document.getElementById("game-wrapper").style.display = "none";
            document.getElementById("menu-screen").style.display = "flex";
            loadLeaderboardData();
        }

        function handlePlayerDeath() {
            isGameRunning = false;
            clearTimeout(zombieInterval);
            clearInterval(medicInterval);
            saveLeaderboardRecord(player.customName, currentRound, lvl);
            alert(`GAME OVER!\n${player.customName} survived to Round ${currentRound} (Gun Lvl ${lvl}).`);
            leaveActiveGame();
        }

        function checkRoundProgression() {
            if (enemiesDefeatedInRound >= roundSpawnTotal && zombies.length === 0 && bosses.length === 0) {
                currentRound++;
                if (currentRound > 100) {
                    saveLeaderboardRecord(player.customName, 100, lvl);
                    alert("VICTORY! SQUAD SURVIVED ROUND 100!");
                    leaveActiveGame();
                    return;
                }
                enemiesDefeatedInRound = 0;
                roundSpawnTotal = 10 + (currentRound * 4);
                if (currentRound % 10 === 0) triggerMilestoneBoss();
                updateUI();
            }
        }

        // Leaderboard Cloud System Simulation Array via LocalStorage API
        function saveLeaderboardRecord(name, round, gunLvl) {
            let records = JSON.parse(localStorage.getItem("zombie_io_scores")) || [];
            records.push({ name: name, round: round, gunLvl: gunLvl, date: new Date().toLocaleDateString() });
            records.sort((a,b) => b.round - a.round || b.gunLvl - a.gunLvl);
            localStorage.setItem("zombie_io_scores", JSON.stringify(records.slice(0, 50)));
        }

        function loadLeaderboardData() {
            let records = JSON.parse(localStorage.getItem("zombie_io_scores")) || [];
            let container = document.getElementById("leaderboard-container");
            if(records.length === 0) {
                container.innerHTML = "<p style='color:#777; text-align:center;'>No structural data found yet.</p>";
                return;
            }
            let html = "<table style='width:100%; border-collapse:collapse;'><tr><th>NAME</th><th>ROUND</th><th>GUN LVL</th></tr>";
            records.forEach(r => {
                let glowStyle = r.round >= 100 ? "style='color:cyan; font-weight:bold;'" : "";
                html += `<tr ${glowStyle}><td>${r.name}</td><td>Rd ${r.round}</td><td>Lvl ${r.gunLvl}</td></tr>`;
            });
            html += "</table>";
            container.innerHTML = html;
        }

        function toggleLeaderboardModal(open) {
            if(open) loadLeaderboardData();
            document.getElementById("leaderboard-modal").style.display = open ? "flex" : "none";
        }

        function buyUpgrade() {
            if (cash >= cost && lvl < 100) {
                cash -= cost; lvl++; cost = Math.floor(cost * 1.25);
                if (player.perk === 'speed') player.speed += 0.25;
                else player.speed += 0.15;
                checkWeaponTier();
                updateUI();
            }
        }

        function triggerMilestoneBoss() {
            bossActive = true;
            zombies = [];
            let tier = currentRound / 10;
            bosses.push({ 
                x: 400, y: -50, 
                hp: 100 + (tier * 150), maxHp: 100 + (tier * 150), 
                size: 35 + (tier * 4), speed: 0.5 + (tier * 0.08),
                tier: tier
            });
        }

        function checkWeaponTier() {
            if (lvl >= 50) { currentWeapon = "Tactical Mini-Gun"; maxAmmo = 100; }
            else if (lvl >= 35) { currentWeapon = "Laser Railgun"; maxAmmo = 3; }
            else if (lvl >= 20) { currentWeapon = "Plasma Rifle"; maxAmmo = 30; }
            else if (lvl >= 10) { currentWeapon = "Remington Shotgun"; maxAmmo = 5; }
            else { currentWeapon = "M1911 Pistol"; maxAmmo = 7; }
            document.getElementById("ui-weapon").innerText = currentWeapon;
        }

        window.addEventListener("keydown", e => { 
            if(!isGameRunning || isPaused) return;
            keys[e.key.toLowerCase()] = true; 
            if(e.key.toLowerCase() === 'r' && !isReloading && currentAmmo < maxAmmo) startManualReload();
        });
        window.addEventListener("keyup", e => { if(isGameRunning) keys[e.key.toLowerCase()] = false; });
        
        window.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = ((e.clientX - rect.left) / rect.width) * canvas.width;
            mouseY = (((e.clientY - rect.top) / rect.height) * canvas.height) * 1.5 - 120; 
        });
        canvas.addEventListener("mousedown", () => { if(isGameRunning && !isPaused) fireWeapon(); });

        function startManualReload() {
            isReloading = true;
            if(currentWeapon === "Tactical Mini-Gun") reloadTimer = 140;
            else if(currentWeapon === "Laser Railgun") reloadTimer = 110;
            else if(currentWeapon === "Remington Shotgun") reloadTimer = 85;
            else reloadTimer = 45;
            playSound('reload');
            document.getElementById("ui-reloading").style.display = "inline";
        }

        function fireWeapon() {
            if (isReloading || weaponCooldown > 0) return;
            if (currentAmmo <= 0) { startManualReload(); return; }

            currentAmmo--;
            playSound('shoot');
            const baseAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
            let bDamage = 1 + Math.floor(lvl / 7);

            if (currentWeapon === "M1911 Pistol") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*8, vy: Math.sin(baseAngle)*8, dmg: bDamage, color: "#ffff00", life: 1, size: 7 });
                weaponCooldown = 15;
            } 
            else if (currentWeapon === "Remington Shotgun") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle-0.18)*8, vy: Math.sin(baseAngle-0.18)*8, dmg: bDamage, color: "#ff3300", life: 1, size: 6 });
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*8, vy: Math.sin(baseAngle)*8, dmg: bDamage, color: "#ff3300", life: 1, size: 6 });
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle+0.18)*8, vy: Math.sin(baseAngle+0.18)*8, dmg: bDamage, color: "#ff3300", life: 1, size: 6 });
                weaponCooldown = 32;
            } 
            else if (currentWeapon === "Plasma Rifle") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*10, vy: Math.sin(baseAngle)*10, dmg: bDamage * 1.4, color: "#00ffff", life: 1, size: 10 });
                weaponCooldown = 8;
            } 
            else if (currentWeapon === "Laser Railgun") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*13, vy: Math.sin(baseAngle)*13, dmg: bDamage * 2.2, color: "#00ff00", life: 5, size: 5 });
                weaponCooldown = 45;
            } 
            else if (currentWeapon === "Tactical Mini-Gun") {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle-0.04)*11, vy: Math.sin(baseAngle-0.04)*11, dmg: bDamage, color: "magenta", life: 1, size: 6 });
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle+0.04)*11, vy: Math.sin(baseAngle+0.04)*11, dmg: bDamage, color: "orange", life: 1, size: 6 });
                weaponCooldown = 4;
            }
            updateUI();
        }

        function spawnZombie() {
            if(!isGameRunning || isPaused) { zombieInterval = setTimeout(spawnZombie, 500); return; }
            
            if(!bossActive && (zombies.length + enemiesDefeatedInRound < roundSpawnTotal)) {
                let side = Math.floor(Math.random() * 4);
                let rand = Math.random();
                let z = { x: 0, y: 0, hp: 1 + Math.floor(currentRound/4), maxHp: 1 + Math.floor(currentRound/4), speed: 1.4 + (currentRound*0.01), color: "#39e639", type: "normal", shootCooldown: 0 };
                
                if(side === 0) { z.x = Math.random()*800; z.y = -30; }
                else if(side === 1) { z.x = 830; z.y = Math.random()*550; }
                else if(side === 2) { z.x = Math.random()*800; z.y = 580; }
                else { z.x = -30; z.y = Math.random()*550; }

                if (currentRound >= 40 && rand < 0.12) {
                    z.color = "#9900ff"; z.type = "purple_gunner"; z.speed *= 0.9;
                } else if (currentRound >= 30 && rand < 0.36) {
                    z.color = "#ff6600"; z.type = "orange_brute"; z.hp *= 2.4; z.maxHp *= 2.4; z.speed *= 0.7;
                } else if (currentRound >= 20 && rand < 0.45) {
                    z.color = "#0055ff"; z.type = "blue_sprinter"; z.speed *= 1.45;
                } else if (currentRound >= 10 && rand < 0.80) {
                    z.color = "#ff0000"; z.type = "red_stalker"; z.hp *= 1.25; z.maxHp *= 1.25;
                }
                zombies.push(z);
            }
            zombieInterval = setTimeout(spawnZombie, Math.max(100, 1200 - (currentRound * 10)));
        }

        function gameLoop() {
            if(!isGameRunning) return;
            
            if (!isPaused) {
                if(weaponCooldown > 0) weaponCooldown--;

                if (isReloading) {
                    reloadTimer--;
                    if (reloadTimer <= 0) {
                        currentAmmo = maxAmmo; isReloading = false;
                        document.getElementById("ui-reloading").style.display = "none";
                        updateUI();
                    }
                }

                if (keys['w'] && player.y > player.size) player.y -= player.speed;
                if (keys['s'] && player.y < 550 - player.size) player.y += player.speed;
                if (keys['a'] && player.x > player.size) player.x -= player.speed;
                if (keys['d'] && player.x < 800 - player.size) player.x += player.speed;

                player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

                // Projectile Calculations Loop
                bullets.forEach((b, bIdx) => {
                    b.x += b.vx; b.y += b.vy;
                    if (b.x < 0 || b.x > 800 || b.y < 0 || b.y > 550) bullets.splice(bIdx, 1);

                    zombies.forEach((z, zIdx) => {
                        if (Math.hypot(b.x - z.x, b.y - z.y) < 22) {
                            let dealt = b.dmg;
                            if (player.perk === 'lucky' && Math.random() < 0.12) dealt = 999;
                            z.hp -= dealt; b.life--; playSound('hit');
                            if (z.hp <= 0) {
                                zombies.splice(zIdx, 1);
                                enemiesDefeatedInRound++;
                                cash += player.perk === 'looter' ? 30 : 15;
                                updateUI();
                                checkRoundProgression();
                            }
                            if (b.life <= 0) bullets.splice(bIdx, 1);
                        }
                    });

                    bosses.forEach((boss, bossIdx) => {
                        if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size) {
                            boss.hp -= b.dmg; b.life--; playSound('hit');
                            if (boss.hp <= 0) {
                                if(boss.tier === 1) tier1Defeated = true;
                                if(boss.tier === 2) tier2Defeated = true;
                                if(boss.tier === 3) tier3Defeated = true;
                                if(boss.tier === 4) tier4Defeated = true;
                                bosses.splice(bossIdx, 1);
                                cash += player.perk === 'looter' ? 300 : 150;
                                bossActive = false;
                                updateUI();
                                checkRoundProgression();
                            }
                            if (b.life <= 0) bullets.splice(bIdx, 1);
                        }
                    });
                });

                // Enemy Bullet Physics
                enemyBullets.forEach((eb, ebIdx) => {
                    eb.x += eb.vx; eb.y += eb.vy;
                    if (eb.x < 0 || eb.x > 800 || eb.y < 0 || eb.y > 550) enemyBullets.splice(ebIdx, 1);

                    if (Math.hypot(eb.x - player.x, eb.y - player.y) < player.size) {
                        hp -= player.perk === 'tank' ? 2 : 4;
                        enemyBullets.splice(ebIdx, 1);
                        updateUI();
                        if(hp <= 0) handlePlayerDeath();
                    }
                });

                // Zombie Movement AI
                zombies.forEach((z, zIdx) => {
                    let zAngle = Math.atan2(player.y - z.y, player.x - z.x);
                    z.x += Math.cos(zAngle) * z.speed; z.y += Math.sin(zAngle) * z.speed;
